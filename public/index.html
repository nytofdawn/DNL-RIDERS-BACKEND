<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Rider Radio — Group Voice Call</title>
<meta name="description" content="No login. Enter a channel, ride with your crew on a live voice call.">
<meta name="theme-color" content="#14171A">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="static-noise" aria-hidden="true"></div>

<!-- ===================== JOIN SCREEN ===================== -->
<main id="joinScreen" class="screen">
  <div class="brand">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 48 48" width="34" height="34">
        <circle cx="24" cy="24" r="21" fill="none" stroke="var(--amber)" stroke-width="2.5"/>
        <path d="M24 12 L24 20 M24 28 L24 36 M12 24 L20 24 M28 24 L36 24" stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="24" cy="24" r="4" fill="var(--amber)"/>
      </svg>
    </div>
    <h1>RIDER<span>RADIO</span></h1>
  </div>
  <p class="tagline">No accounts. No chat. Key up, ride together.</p>

  <form id="joinForm" class="join-panel" autocomplete="off">
    <label class="field">
      <span class="field-label">CHANNEL</span>
      <input id="roomInput" type="text" placeholder="e.g. sunday-cruise" maxlength="40" required inputmode="text" autocapitalize="off" autocorrect="off" spellcheck="false">
    </label>
    <label class="field">
      <span class="field-label">RIDER NAME <em>(optional)</em></span>
      <input id="nameInput" type="text" placeholder="e.g. Ghost" maxlength="24" autocapitalize="words">
    </label>

    <button type="submit" id="joinBtn" class="btn btn-primary">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M12 15a3 3 0 003-3V6a3 3 0 00-6 0v6a3 3 0 003 3z" stroke="currentColor" stroke-width="2"/><path d="M19 11a7 7 0 01-14 0M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      KEY UP &amp; JOIN
    </button>
    <p id="joinError" class="join-error" hidden></p>
    <p class="hint">Mic + sound turn on automatically the moment you join — keep your ringer / media volume up.</p>
  </form>
</main>

<!-- ===================== CALL SCREEN ===================== -->
<main id="callScreen" class="screen" hidden>
  <header class="call-header">
    <div class="channel-tag">
      <span class="dot live" aria-hidden="true"></span>
      <span class="channel-name" id="channelNameLabel">—</span>
    </div>
    <div class="status-mono" id="connStatus">CONNECTING…</div>
  </header>

  <section class="dial-wrap">
    <div class="dial" id="dial">
      <div class="dial-ring dial-ring-outer" aria-hidden="true"></div>
      <div class="dial-ring dial-ring-inner" aria-hidden="true"></div>
      <button id="talkToggle" class="dial-center" type="button" aria-pressed="false">
        <svg id="micIconOn" viewBox="0 0 24 24" width="34" height="34" fill="none"><path d="M12 15a3 3 0 003-3V6a3 3 0 00-6 0v6a3 3 0 003 3z" stroke="currentColor" stroke-width="2"/><path d="M19 11a7 7 0 01-14 0M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <svg id="micIconOff" viewBox="0 0 24 24" width="34" height="34" fill="none" hidden><path d="M3 3l18 18M12 15a3 3 0 003-3V6a1 1 0 00-.05-.32M9 5.08V6a3 3 0 004.6 2.54" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M19 11a7 7 0 01-9.8 6.4M5 11a7 7 0 001.2 3.9M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span id="talkLabel">LIVE</span>
      </button>
      <!-- rider LED nodes are injected around the ring here -->
      <div id="riderNodes" class="rider-nodes"></div>
    </div>
    <p class="dial-caption" id="riderCount">You're the only one on this channel</p>
  </section>

  <ul id="riderList" class="rider-list" aria-label="Riders on this channel"></ul>

  <footer class="call-controls">
    <button id="leaveBtn" class="btn btn-danger" type="button">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M4 15v-3a8 8 0 0116 0v3M2 16.5a1.5 1.5 0 011.5-1.5h1a1.5 1.5 0 011.5 1.5v2a1.5 1.5 0 01-1.5 1.5h-1A1.5 1.5 0 012 18.5v-2zM19 16.5a1.5 1.5 0 011.5-1.5h1a1.5 1.5 0 011.5 1.5v2a1.5 1.5 0 01-1.5 1.5h-1a1.5 1.5 0 01-1.5-1.5v-2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      LEAVE CHANNEL
    </button>
  </footer>
</main>

<div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

<!-- hidden audio sinks for each remote rider -->
<div id="audioSinks" hidden></div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
